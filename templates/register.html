{% extends "base.html" %}
{% block title %}注册 — RehabGuide{% endblock %}

{% block content %}
<section class="login-page">
    <div class="login-card fade-up">
        <div class="login-logo" aria-hidden="true">R</div>
        <div class="login-header">
            <h1>创建账号</h1>
            <p>注册后可查看和购买康复指南</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="login-form">
            <div class="field">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required
                       placeholder="3-20个字符" autocomplete="username"
                       minlength="3" maxlength="20">
            </div>
            <div class="field">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required
                       placeholder="至少6个字符" autocomplete="new-password"
                       minlength="6">
            </div>
            <div class="field">
                <label for="confirm">确认密码</label>
                <input type="password" id="confirm" name="confirm" required
                       placeholder="再次输入密码" autocomplete="new-password"
                       minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">注册</button>
        </form>
        <div class="login-note">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            <span>已有账号？<a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:600;">去登录</a></span>
        </div>
    </div>
</section>
{% endblock %}
