{% extends "base.html" %}
{% block title %}{{ product.name }} · 在线预览 — RehabGuide{% endblock %}

{% block content %}
<section class="page">
    <div class="container">
        <div class="page-header">
            <div class="page-header-left">
                <a href="/shop/shop" class="breadcrumb">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                    返回我的指南
                </a>
                <h1 class="page-title">{{ product.icon }} {{ product.name }}</h1>
                <p class="page-subtitle">{{ product.desc }}</p>
            </div>
            <div class="page-header-actions">
                <a href="/shop/download/{{ condition }}/html" class="btn btn-primary btn-sm">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载 HTML
                </a>
            </div>
        </div>

        <div class="iframe-wrapper">
            {% if is_free %}
            <iframe src="/shop/files-free/{{ condition }}" title="{{ product.name }}" loading="lazy"></iframe>
            {% else %}
            <iframe src="/shop/files/{{ condition }}" title="{{ product.name }}" loading="lazy"></iframe>
            {% endif %}
        </div>
    </div>
</section>
{% endblock %}
